name: Flutter Build & Release

on:
  push:
    tags:
      - 'v*'  # Triggers workflow on versioned tags like v1.0.0

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.2  # Change this to your Flutter version

      - name: Install Dependencies
        working-directory: 3Y2AAPWD/frontend
        run: flutter pub get

      - name: Build APK
        working-directory: 3Y2AAPWD/frontend
        run: flutter build apk --release

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: 3Y2AAPWD/frontend/build/app/outputs/flutter-apk/app-release.apk  # Adjust path
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref }}
          name: "Release ${{ github.ref_name }}"
          body: "This is an automatic release of version ${{ github.ref_name }}."
          draft: false
          prerelease: false
